    <style>
        .markdown-section table p,
        .markdown-section table ul{
            margin-top: 0;
            margin-bottom: 0.2rem;
        }
        .markdown-section table ul{
            line-height: 1.2rem;
        }
    </style>
</head>
<body>
<div id="app">Please wait...</div>
<script>
    window.$docsify = {
        name: 'Keywords Everywhere API',
        loadSidebar: true,
        logo: '_media/keywordseverywhere.png',
        themeColor: '#C2504F',
        requestHeaders: {
            'cache-control': 'max-age=0, no-cache',
        },

        // complete configuration parameters
        search: {
            maxAge: 1, // Expiration time, the default 86400000 (1 day)
            // paths: [], // or 'auto'
            placeholder: 'Type to search',

            noData: 'No Results!',

            // Headline depth, 1 - 6
            // depth: 2,

            hideOtherSidebarContent: true, // whether to hide other sidebar content

            // To avoid search index collision
            // between multiple websites under the same domain
            namespace: 'ke-api',
        },
        markdown: {
            smartypants: true,
        },
        mustache: {
            data: [
                {
                    "v1_ruby_disable_ssl": false,
                    "v1_banner": false
                },
                'config.json',
            ]
        }
    };
</script>
